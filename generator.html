<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Undangan - Yusfi & Marwah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Work+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #a3b18a;
            --dark-sage: #3a5a40;
            --beige: #fefae0;
            --earth: #d4a373;
        }
        body {
            font-family: 'Work Sans', sans-serif;
            background-color: var(--beige);
            color: var(--dark-sage);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
        h2 {
            font-family: 'Sacramento', cursive;
            font-size: 3rem;
            color: var(--dark-sage);
        }
        .btn-primary {
            background-color: var(--dark-sage);
            border: none;
            padding: 12px;
            border-radius: 10px;
        }
        .btn-primary:hover {
            background-color: var(--sage);
        }
        .form-label {
            font-weight: 600;
        }
        .result-box {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="login-screen" class="card p-4 p-md-5">
    <div class="text-center mb-4">
        <h2>Login Generator</h2>
        <p class="text-muted">Masukkan username dan password untuk melanjutkan.</p>
    </div>
    <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Username">
    </div>
    <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Password">
    </div>
    <button class="btn btn-primary w-100" onclick="checkLogin()">
        <i class="bi bi-box-arrow-in-right me-2"></i> Login
    </button>
</div>

<div id="generator-content" class="card p-4 p-md-5" style="display: none;">
    <ul class="nav nav-tabs mb-4" id="adminTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="invite-tab" data-bs-toggle="tab" data-bs-target="#invite" type="button" role="tab" aria-controls="invite" aria-selected="true">Generator Link</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="settings-tab" data-bs-toggle="tab" data-bs-target="#settings" type="button" role="tab" aria-controls="settings" aria-selected="false">Pengaturan Undangan</button>
        </li>
    </ul>

    <div class="tab-content" id="adminTabContent">
        <!-- TAB 1: GENERATOR -->
        <div class="tab-pane fade show active" id="invite" role="tabpanel" aria-labelledby="invite-tab">
            <div class="mb-3">
                <label for="guest-name" class="form-label">Nama Tamu</label>
                <input type="text" id="guest-name" class="form-control" placeholder="Contoh: Bapak Tedi & Keluarga">
            </div>

            <button class="btn btn-primary w-100 mb-4" onclick="generateInvitation()">
                <i class="bi bi-magic me-2"></i> Generate Link & Pesan
            </button>

            <div id="result-container" style="display: none;">
                <div class="result-box">
                    <label for="generated-link" class="form-label">Link Undangan:</label>
                    <div class="input-group mb-3">
                        <input type="text" id="generated-link" class="form-control" readonly>
                        <button class="btn btn-outline-secondary" onclick="copyToClipboard('generated-link')">
                            <i class="bi bi-copy"></i> Salin
                        </button>
                    </div>

                    <label for="generated-message" class="form-label">Pesan WhatsApp:</label>
                    <textarea id="generated-message" class="form-control mb-3" rows="10" readonly></textarea>
                    
                    <button class="btn btn-success w-100" onclick="shareWhatsApp()">
                        <i class="bi bi-whatsapp me-2"></i> Kirim via WhatsApp
                    </button>
                </div>
            </div>
        </div>

        <!-- TAB 2: SETTINGS -->
        <div class="tab-pane fade" id="settings" role="tabpanel" aria-labelledby="settings-tab">
            <p class="text-muted small mb-4">Ubah detail pernikahan di bawah ini, lalu klik "Generate Config" untuk mendapatkan kode yang baru.</p>
            
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nama Panggilan Pria</label>
                    <input type="text" id="groom-nick" class="form-control" value="Yusfi">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nama Panggilan Wanita</label>
                    <input type="text" id="bride-nick" class="form-control" value="Marwah">
                </div>
                <div class="col-12">
                    <label class="form-label">Nama Lengkap Pria</label>
                    <input type="text" id="groom-full" class="form-control" value="Yusuf Supriyadi">
                </div>
                <div class="col-12">
                    <label class="form-label">Nama Orang Tua Pria</label>
                    <input type="text" id="groom-parents" class="form-control" value="Putra dari Bpk. Selamet Riyadi & Ibu Munyati">
                </div>
                <div class="col-12">
                    <label class="form-label">Nama Lengkap Wanita</label>
                    <input type="text" id="bride-full" class="form-control" value="Marwah Aulia">
                </div>
                <div class="col-12">
                    <label class="form-label">Nama Orang Tua Wanita</label>
                    <input type="text" id="bride-parents" class="form-control" value="Putri dari Bpk. Lorem Ipsum & Ibu Ipsum Loren">
                </div>
                <div class="col-12 border-top pt-3">
                    <label class="form-label">Tanggal Acara Utama (Tampilan)</label>
                    <input type="text" id="event-date" class="form-control" value="Sabtu, 21 Juni 2025">
                </div>
                <div class="col-12">
                    <label class="form-label">Tanggal Countdown (ISO Format)</label>
                    <input type="text" id="event-iso" class="form-control" value="2025-06-21T08:00:00">
                </div>
                <div class="col-12">
                    <label class="form-label">Link Google Maps (URL)</label>
                    <input type="text" id="maps-link" class="form-control" value="https://maps.app.goo.gl/uQsAwfTTj4KM1hBF6">
                </div>
                <div class="col-12 border-top pt-3">
                    <label class="form-label">Turut Mengundang (Pisahkan dengan koma)</label>
                    <textarea id="turut-mengundang" class="form-control" rows="3">Keluarga Besar Bpk. Selamet Riyadi, Keluarga Besar Bpk. Lorem Ipsum, Sahabat & Rekan Kerja</textarea>
                </div>
            </div>

            <button class="btn btn-dark w-100 mt-4" onclick="updateConfig()">
                <i class="bi bi-code-slash me-2"></i> Generate Config Code
            </button>

            <div id="config-result-container" style="display: none;" class="mt-4">
                <label class="form-label text-danger fw-bold">Salin dan Timpa isi file config.js dengan kode ini:</label>
                <textarea id="generated-config" class="form-control bg-dark text-success" rows="10" readonly></textarea>
                <button class="btn btn-outline-dark btn-sm mt-2" onclick="copyToClipboard('generated-config')">Salin Kode</button>
            </div>
        </div>
    </div>
    
    <div class="text-center mt-5">
        <a href="index.html" class="text-decoration-none small text-muted">
            <i class="bi bi-arrow-left"></i> Kembali ke Undangan
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function updateConfig() {
        const config = {
            couple: {
                groom: {
                    nickname: document.getElementById('groom-nick').value,
                    fullName: document.getElementById('groom-full').value,
                    parents: document.getElementById('groom-parents').value,
                    photo: "img/cowo1.jpg"
                },
                bride: {
                    nickname: document.getElementById('bride-nick').value,
                    fullName: document.getElementById('bride-full').value,
                    parents: document.getElementById('bride-parents').value,
                    photo: "img/cewe1.jpg"
                }
            },
            event: {
                date: document.getElementById('event-date').value,
                timestamp: document.getElementById('event-iso').value,
                location: "Gedung BellaVista",
                address: "Jl. Jatimakmur, Kec. Pondok Gede, Kota Bekasi",
                mapsLink: document.getElementById('maps-link').value,
                mapsEmbed: "https://www.google.com/maps/embed?pb=...",
                akad: { time: "08.00 - 10.00", date: "Minggu, 29 Maret 2026" },
                resepsi: { time: "11.00 - Selesai", date: "Minggu, 29 Maret 2026" }
            },
            gifts: [
                { bank: "BCA", accountNumber: "1234567890", owner: document.getElementById('groom-full').value },
                { bank: "MANDIRI", accountNumber: "0987654321", owner: document.getElementById('bride-full').value }
            ],
            turutMengundang: document.getElementById('turut-mengundang').value.split(',').map(s => s.trim())
        };

        const configCode = `const weddingConfig = ${JSON.stringify(config, null, 4)};`;
        document.getElementById('generated-config').value = configCode;
        document.getElementById('config-result-container').style.display = 'block';
    }

    function checkLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        if (user === 'admin' && pass === '@adi1212') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('generator-content').style.display = 'block';
        } else {
            alert('Username atau Password salah!');
        }
    }

    // Allow login with Enter key
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            if (document.getElementById('login-screen').style.display !== 'none') {
                checkLogin();
            }
        }
    });

    function generateInvitation() {
        const name = document.getElementById('guest-name').value;
        if (!name) {
            alert('Silakan masukkan nama tamu.');
            return;
        }

        // Get the base URL (pointing to index.html)
        let baseUrl = window.location.href.replace('generator.html', 'index.html').split('?')[0];
        if (!baseUrl.includes('index.html')) {
            baseUrl = baseUrl.endsWith('/') ? baseUrl + 'index.html' : baseUrl + '/index.html';
        }
        
        const encodedName = encodeURIComponent(name);
        const link = `${baseUrl}?to=${encodedName}`;
        
        const message = `Assalamu'alaikum Warahmatullahi Wabarakatuh

Kepada Yth.
Bapak/Ibu/Saudara/i

${name}

Tanpa mengurangi rasa hormat, perkenankan kami mengundang Bapak/Ibu/Saudara/i untuk menghadiri acara pernikahan kami.

Berikut link undangan kami, untuk info lengkap dari acara bisa kunjungi :

${link}

Merupakan suatu kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan untuk hadir dan memberikan doa restu.

Mohon maaf perihal undangan hanya di bagikan melalui pesan ini.

Terima kasih banyak atas perhatiannya.

Wassalamu'alaikum Warahmatullahi Wabarakatuh

Hormat Kami,
Yusfi & Marwah`;

        document.getElementById('generated-link').value = link;
        document.getElementById('generated-message').value = message;
        document.getElementById('result-container').style.display = 'block';
    }

    function copyToClipboard(id) {
        const el = document.getElementById(id);
        el.select();
        document.execCommand('copy');
        alert('Tersalin ke clipboard!');
    }

    function shareWhatsApp() {
        const message = document.getElementById('generated-message').value;
        const url = `https://wa.me/?text=${encodeURIComponent(message)}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
