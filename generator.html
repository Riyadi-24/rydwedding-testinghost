<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Undangan - Yusfi & Marwah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Work+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #a3b18a;
            --dark-sage: #3a5a40;
            --beige: #fefae0;
            --earth: #d4a373;
        }
        body {
            font-family: 'Work Sans', sans-serif;
            background-color: var(--beige);
            color: var(--dark-sage);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
        h2 {
            font-family: 'Sacramento', cursive;
            font-size: 3rem;
            color: var(--dark-sage);
        }
        .btn-primary {
            background-color: var(--dark-sage);
            border: none;
            padding: 12px;
            border-radius: 10px;
        }
        .btn-primary:hover {
            background-color: var(--sage);
        }
        .form-label {
            font-weight: 600;
        }
        .result-box {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="card p-4 p-md-5">
    <div class="text-center mb-4">
        <h2>Generator Undangan</h2>
        <p class="text-muted">Buat link dan pesan undangan otomatis untuk tamu.</p>
    </div>

    <div class="mb-3">
        <label for="guest-name" class="form-label">Nama Tamu</label>
        <input type="text" id="guest-name" class="form-control" placeholder="Contoh: Bapak Tedi & Keluarga">
    </div>

    <button class="btn btn-primary w-100 mb-4" onclick="generateInvitation()">
        <i class="bi bi-magic me-2"></i> Generate Link & Pesan
    </button>

    <div id="result-container" style="display: none;">
        <div class="result-box">
            <label for="generated-link" class="form-label">Link Undangan:</label>
            <div class="input-group mb-3">
                <input type="text" id="generated-link" class="form-control" readonly>
                <button class="btn btn-outline-secondary" onclick="copyToClipboard('generated-link')">
                    <i class="bi bi-copy"></i> Salin
                </button>
            </div>

            <label for="generated-message" class="form-label">Pesan WhatsApp:</label>
            <textarea id="generated-message" class="form-control mb-3" rows="10" readonly></textarea>
            
            <button class="btn btn-success w-100" onclick="shareWhatsApp()">
                <i class="bi bi-whatsapp me-2"></i> Kirim via WhatsApp
            </button>
        </div>
    </div>
    
    <div class="text-center mt-4">
        <a href="index.html" class="text-decoration-none small text-muted">
            <i class="bi bi-arrow-left"></i> Kembali ke Undangan
        </a>
    </div>
</div>

<script>
    function generateInvitation() {
        const name = document.getElementById('guest-name').value;
        if (!name) {
            alert('Silakan masukkan nama tamu.');
            return;
        }

        // Get the base URL (pointing to index.html)
        let baseUrl = window.location.href.replace('generator.html', 'index.html').split('?')[0];
        if (!baseUrl.includes('index.html')) {
            baseUrl = baseUrl.endsWith('/') ? baseUrl + 'index.html' : baseUrl + '/index.html';
        }
        
        const encodedName = encodeURIComponent(name);
        const link = `${baseUrl}?to=${encodedName}`;
        
        const message = `Assalamu'alaikum Warahmatullahi Wabarakatuh

Kepada Yth.
Bapak/Ibu/Saudara/i

${name}

Tanpa mengurangi rasa hormat, perkenankan kami mengundang Bapak/Ibu/Saudara/i untuk menghadiri acara pernikahan kami.

Berikut link undangan kami, untuk info lengkap dari acara bisa kunjungi :

${link}

Merupakan suatu kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan untuk hadir dan memberikan doa restu.

Mohon maaf perihal undangan hanya di bagikan melalui pesan ini.

Terima kasih banyak atas perhatiannya.

Wassalamu'alaikum Warahmatullahi Wabarakatuh

Hormat Kami,
Yusfi & Marwah`;

        document.getElementById('generated-link').value = link;
        document.getElementById('generated-message').value = message;
        document.getElementById('result-container').style.display = 'block';
    }

    function copyToClipboard(id) {
        const el = document.getElementById(id);
        el.select();
        document.execCommand('copy');
        alert('Tersalin ke clipboard!');
    }

    function shareWhatsApp() {
        const message = document.getElementById('generated-message').value;
        const url = `https://wa.me/?text=${encodeURIComponent(message)}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
